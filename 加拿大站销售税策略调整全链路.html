            '2': { title: '维度二：结算端提交与支付表现复盘', content: `<ul><li><strong>提交订单率持续承压</strong>：提交订单率从基准56.72%波动下行，平均54.75%，最低跌至50.31%（3/27），税费感知导致用户在结算环节犹豫增加。</li><li><strong>支付成功率相对稳定</strong>：支付成功率基准92.84%，平均92.16%，虽有波动但截止目前已较平稳，因后端支付环节中提交订单已筛选过一轮用户，受影响较小。</li><li><strong>物流时效影响有限</strong>：3/20经济线物流时效不可达事件对支付成功率影响有限，但填写地址率在3/20前后出现小幅波动。</li><li><strong>默认税费显示调整影响</strong>：在04/02将原本的税费按默认最低税率省份修改为在客户填写地址后再计算汇率。04/03-04/13的均值数据相较于03/11-04/01的均值数据，地址填写率有所上升，从74.72%升为77.90%。选择物流率有略微波动，从90.24%变为88.60%。</li></ul>` },
            '3': { title: '维度三：复活节同比分析 (2026 vs 2025)', content: `<ul><li><strong>2025年复活节商品占比较低</strong>：2025年复活节期间，加拿大站点热卖商品中复活节商品占比较小，热卖品TOP1为高尔夫球印章，流量占全站18%。全站浏览人数中，非复活节商品占比为93.26%，复活节商品为6.74%。因此2025年同期指标受复活节经济线不可达因素影响较小。</li><li><strong>2026年业务规模显著扩大</strong>：相较2025年同比（浏览人数215,858），2026年浏览人数达432,418，增长100.3%，业务规模大幅扩张。</li><li><strong>2026年核心指标全面下滑</strong>：转化率从2025年的3.20%降至2.40%，提交订单率从59.35%降至54.75%，支付成功率从93.24%降至92.16%，主要受税费政策冲击。</li><li><strong>加购率受物流时效影响明显</strong>：2026年3/20当日加购率从9.88%骤降至6.48%，下滑幅度明显，后续逐步回升。</li><li><strong>CPC对比</strong>：加拿大FB广告投放主要采用统投方式，虽然获客成本较去年同期下降，但也导致广告投放流量不够精准。</li></ul>` }
        };

        function updateConclusion(tabId) {
            const data = conclusionTexts[tabId];
            document.getElementById('conclusionTabName').innerText = data.title;
            document.getElementById('conclusionContent').innerHTML = data.content;
        }

        let currentTab = '1';
        let currentDim3Panel = 'yoy';

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentTab = this.getAttribute('data-tab');
                document.getElementById('dim3PanelContainer').style.display = (currentTab === '3' ? 'block' : 'none');
                document.getElementById('mainContainer').style.display = (currentTab === '3' ? 'none' : 'block');
                document.getElementById('slicerChartContainer').style.display = (currentTab === '2' ? 'none' : 'block');
                document.getElementById('dim2ExtraChartContainer').style.display = (currentTab === '2' ? 'block' : 'none');
                document.getElementById('slicerTitle').innerText = (currentTab === '1' ? '维度一核心指标趋势 (切片器)' : '维度三指标对比 (切片器)');
                updateEventNote(currentTab);
                updateConclusion(currentTab);
                const firstMetric = updateSlicerButtons(currentTab);
                if (currentTab === '1') {
                    myChart.setOption(option1, true);
                    updateSlicerChartDim1(firstMetric);
                } else if (currentTab === '2') {
                    myChart.setOption(option2, true);
                    setTimeout(() => {
                        dim2ExtraChart.resize();
                        dim2ExtraChart.setOption(option2Extra, true);
                        setTimeout(() => { dim2ExtraChart.resize(); }, 150);
                    }, 50);
                } else {
                    updateSlicerChartDim3(firstMetric);
                }
            });
        });

        document.querySelectorAll('#dim3PanelBtns .slicer-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('#dim3PanelBtns .slicer-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentDim3Panel = this.getAttribute('data-panel');
                const activeMetric = document.querySelector('#slicerBtnGroup .slicer-btn.active').getAttribute('data-metric');
                updateSlicerChartDim3(activeMetric);
            });
        });

        window.addEventListener('resize', () => { myChart.resize(); slicerChart.resize(); dim2ExtraChart.resize(); });

        updateEventNote('1');
        updateConclusion('1');
        const initMetric = updateSlicerButtons('1');
        myChart.setOption(option1);
        updateSlicerChartDim1(initMetric);
    };
</script>
